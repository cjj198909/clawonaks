# charts/openclaw/templates/netpol-sandbox.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-egress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: openclaw-sandbox
  policyTypes: [Egress]
  egress:
  # Feishu WebSocket (Outbound HTTPS)
  - to: []
    ports:
    - protocol: TCP
      port: 443
  # APIM internal network
  - to:
    - ipBlock:
        cidr: 10.0.8.0/24
    ports:
    - protocol: TCP
      port: 443
  # DNS
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
